name: 💰 Reward Task
description: Task issue with Reward
title: '[Reward] '
labels:
    - reward
body:
    - type: textarea
      id: description
      attributes:
          label: Task description
      validations:
          required: true

    - type: dropdown
      id: currency
      attributes:
          label: Reward currency
          options:
              - 'USD $'
              - 'CAD C$'
              - 'AUD A$'
              - 'GBP £'
              - 'EUR €'
              - 'CNY ¥'
              - 'HKD HK$'
              - 'TWD NT$'
              - 'SGD S$'
              - 'KRW ₩'
              - 'JPY ¥'
              - 'INR ₹'
              - 'UAH ₴'
      validations:
          required: true

    - type: input
      id: amount
      attributes:
          label: Reward amount
      validations:
          required: true

    - type: input
      id: payer
      attributes:
          label: Reward payer
          description: GitHub username of the payer (optional, defaults to issue creator)
      validations:
          required: false