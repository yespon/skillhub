name = "api-drift"
description = "Verify OpenAPI-generated frontend types stay in sync after Controller changes."
sandbox_mode = "workspace-write"
# model is inherited from the parent session, matching the original `model: inherit`.

developer_instructions = """
# API Drift 检测

## 触发场景

修改了 `server/skillhub-app/src/main/java/**/controller/**/*.java` 后。

## 检测步骤

1. 提示用户运行：
   ```bash
   make generate-api
   ```

2. 检查 schema 是否有未提交的变更：
   ```bash
   git diff --name-only HEAD -- web/src/api/generated/schema.d.ts
   ```

3. **若有 diff**：提示将 `web/src/api/generated/schema.d.ts` 加入本次提交
   **若无 diff**：确认 API 契约未变更，可继续

## 注意

`make generate-api` 会请求 `http://localhost:8080/v3/api-docs`。如果本地后端未运行，先执行 `make dev-all`，或至少执行 `make dev` 后再启动后端进程。
"""
