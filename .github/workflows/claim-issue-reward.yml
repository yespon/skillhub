name: Claim Issue Reward
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Closed reward issue number to process manually
        required: true
        type: string
      currency:
        description: Reward currency label, for example CNY ¥ or USD $
        required: true
        type: string
      amount:
        description: Reward amount
        required: true
        type: string
      payer:
        description: Optional GitHub username of the payer, defaults to workflow actor
        required: false
        type: string

concurrency:
  group: claim-issue-reward-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  claim-issue-reward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Calculate & Save Reward
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deno --allow-run --allow-sys --allow-env --allow-read --allow-net=api.github.com \
            .github/scripts/share-reward.ts \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "${{ inputs.issue_number }}" \
            "${{ inputs.payer || github.actor }}" \
            "${{ inputs.currency }}" \
            "${{ inputs.amount }}"
