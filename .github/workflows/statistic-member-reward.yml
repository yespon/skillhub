name: Statistic Member Reward
on:
  workflow_dispatch:
    inputs:
      month:
        description: Optional month label for manual run tracking, for example 2026-04
        required: false
        type: string

jobs:
  statistic-member-reward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check for new commits since last statistic
        id: detect_changes
        run: |
          last_tag=$(git describe --tags --abbrev=0 --match "statistic-*" || echo "")

          if [ -z "$last_tag" ]; then
            echo "No previous statistic tags found."
            echo "new_commits=true" >> "$GITHUB_OUTPUT"
          else
            new_commits=$(git log $last_tag..HEAD --oneline)
            if [ -z "$new_commits" ]; then
              echo "No new commits since last statistic tag."
              echo "new_commits=false" >> "$GITHUB_OUTPUT"
            else
              echo "New commits found."
              echo "new_commits=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        if: steps.detect_changes.outputs.new_commits == 'true'
        with:
          deno-version: v2.x

      - name: Statistic rewards
        if: steps.detect_changes.outputs.new_commits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: deno --allow-run --allow-sys --allow-env --allow-read --allow-net=api.github.com repo-ops/reward/count-reward.ts
