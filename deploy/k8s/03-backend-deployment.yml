apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-server
  namespace: skillhub
  labels:
    app.kubernetes.io/name: skillhub-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-server
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: server
          # 替换为实际镜像仓库地址（内网需提前同步镜像）
          image: harbor.ruijie.com.cn/skillhub/skillhub-server:20260421
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: skillhub-config
            - secretRef:
                name: skillhub-secret
          ports:
            - containerPort: 8080
              name: http
          # 无 PVC：不挂载 local storage，使用 S3
          # 注意：移除了原始 compose 中的 skillhub_storage volume mount
          env:
            # ---- 从 ConfigMap 读取 ----
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SKILLHUB_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-public-base-url

            # ---- 数据库 ----
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-port
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-db
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-user
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: POSTGRES_PASSWORD

            # ---- Redis ----
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-port
            # 若 Redis 无密码，删除以下两行
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: REDIS_PASSWORD

            # ---- S3 存储 ----
            - name: SKILLHUB_STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-provider
            - name: SKILLHUB_STORAGE_S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-endpoint
            - name: SKILLHUB_STORAGE_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-bucket
            - name: SKILLHUB_STORAGE_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-region
            - name: SKILLHUB_STORAGE_S3_FORCE_PATH_STYLE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-force-path-style
            - name: SKILLHUB_STORAGE_S3_AUTO_CREATE_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-auto-create-bucket
            - name: SKILLHUB_STORAGE_S3_PRESIGN_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-presign-expiry
            - name: SKILLHUB_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILLHUB_STORAGE_S3_ACCESS_KEY
            - name: SKILLHUB_STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILLHUB_STORAGE_S3_SECRET_KEY

            # ---- 会话安全 ----
            - name: SESSION_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: session-cookie-secure

            # ---- Bootstrap 管理员 ----
            - name: BOOTSTRAP_ADMIN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: BOOTSTRAP_ADMIN_ENABLED
            - name: BOOTSTRAP_ADMIN_USER_ID
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: BOOTSTRAP_ADMIN_USER_ID
            - name: BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: BOOTSTRAP_ADMIN_USERNAME
            - name: BOOTSTRAP_ADMIN_DISPLAY_NAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: BOOTSTRAP_ADMIN_DISPLAY_NAME
            - name: BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: BOOTSTRAP_ADMIN_EMAIL
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: BOOTSTRAP_ADMIN_PASSWORD
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_ID
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_SECRET
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-provider
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_AUTHORIZATION_GRANT_TYPE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-authorization-grant-type
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-redirect-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_NAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-client-name
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_AUTHORIZATION_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-authorization-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_TOKEN_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-token-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_USER_INFO_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-user-info-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_USER_NAME_ATTRIBUTE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-user-name-attribute
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ENABLED
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_KEY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_KEY
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_0
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_0
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_1
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_1
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_KEY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_KEY
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUE
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_NAMESPACE_SLUG
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_NAMESPACE_SLUG
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ROLE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ROLE
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_OSDS_ENABLED
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_OSDS_BASE_URL
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_STAFF_BY_USER_ID_PATH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_OSDS_STAFF_BY_USER_ID_PATH
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_SYSID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILLHUB_AUTH_SOURCEID_OSDS_SYSID
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILLHUB_AUTH_SOURCEID_OSDS_ACCESS_KEY_SECRET
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_SIGN_SERVER_AUTH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_AUTH_SOURCEID_OSDS_SIGN_SERVER_AUTH
          
          # 启动期间 Flyway 数据库迁移需要时间，给足 startupProbe 时间
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
