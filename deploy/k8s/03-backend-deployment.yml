apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-server
  namespace: skillhub
  labels:
    app.kubernetes.io/name: skillhub-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-server
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: server
          # 替换为实际镜像仓库地址（内网需提前同步镜像）
          image: harbor.ruijie.com.cn/skillhub/skillhub-server:20260421
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: skillhub-config
            - secretRef:
                name: skillhub-secret
          ports:
            - containerPort: 8080
              name: http
          # 无 PVC：不挂载 local storage，使用 S3
          # 注意：移除了原始 compose 中的 skillhub_storage volume mount
          # 大部分环境变量通过 envFrom 从 ConfigMap/Secret 注入（SCREAMING_SNAKE 格式），
          # 以下仅保留需要值组合或名称映射的条目。
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # ---- Flyway: 允许乱序补齐 V39 (password_reset_request) ----
            - name: SPRING_FLYWAY_OUT_OF_ORDER
              value: "true"
            # ---- 数据库连接（需从 envFrom 注入的基础变量组合/映射） ----
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: SPRING_DATASOURCE_USERNAME
              value: "$(POSTGRES_USER)"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: POSTGRES_PASSWORD
          
          # 启动期间 Flyway 数据库迁移需要时间，给足 startupProbe 时间
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
