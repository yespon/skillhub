apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-server
  namespace: skillhub
  labels:
    app.kubernetes.io/name: skillhub-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-server
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: server
          image: harbor.ruijie.com.cn/skillhub/skillhub-server:release-r0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: spring-datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: spring-datasource-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: spring-datasource-password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-host
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-port
            - name: SKILLHUB_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-public-base-url
            - name: DEVICE_AUTH_VERIFICATION_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: device-auth-verification-uri
            - name: SKILLHUB_STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-provider
            - name: STORAGE_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: storage-base-path
            - name: SKILLHUB_STORAGE_S3_FORCE_PATH_STYLE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-force-path-style
            - name: SKILLHUB_STORAGE_S3_AUTO_CREATE_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-auto-create-bucket
            - name: SESSION_COOKIE_SECURE
              value: "true"
            - name: SKILLHUB_STORAGE_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: skillhub-storage-s3-endpoint
            - name: SKILLHUB_STORAGE_S3_PUBLIC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: skillhub-storage-s3-public-endpoint
            - name: SKILLHUB_STORAGE_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: skillhub-storage-s3-bucket
            - name: SKILLHUB_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: skillhub-storage-s3-access-key
            - name: SKILLHUB_STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: skillhub-storage-s3-secret-key
            - name: SKILLHUB_STORAGE_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: skillhub-storage-s3-region
            - name: BOOTSTRAP_ADMIN_ENABLED
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: bootstrap-admin-enabled
                  optional: true
            - name: BOOTSTRAP_ADMIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: bootstrap-admin-user-id
                  optional: true
            - name: BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: bootstrap-admin-username
                  optional: true
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: bootstrap-admin-password
                  optional: true
            - name: BOOTSTRAP_ADMIN_DISPLAY_NAME
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: bootstrap-admin-display-name
                  optional: true
            - name: BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: bootstrap-admin-email
                  optional: true
            - name: OAUTH2_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-github-client-id
                  optional: true
            - name: OAUTH2_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-github-client-secret
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-sourceid-client-id
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-sourceid-client-secret
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_PROVIDER
              value: sourceid
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_AUTHORIZATION_GRANT_TYPE
              value: authorization_code
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-sourceid-redirect-uri
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_NAME
              value: 锐捷SSO
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_AUTHORIZATION_URI
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-sourceid-authorization-uri
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_TOKEN_URI
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-sourceid-token-uri
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_USER_INFO_URI
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-sourceid-user-info-uri
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_USER_NAME_ATTRIBUTE
              value: id
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
