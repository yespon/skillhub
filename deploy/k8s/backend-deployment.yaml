apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-server
  labels:
    app.kubernetes.io/name: skillhub-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-server
    spec:
      containers:
        - name: server
          image: ghcr.io/iflytek/skillhub-server:edge
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: spring-datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: spring-datasource-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: spring-datasource-password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-host
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-port
            - name: STORAGE_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: storage-base-path
            - name: SKILLHUB_SECURITY_SCANNER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skill-scanner-enabled
            - name: SKILLHUB_SECURITY_SCANNER_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skill-scanner-url
            - name: SKILLHUB_SECURITY_SCANNER_MODE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skill-scanner-mode
            - name: SESSION_COOKIE_SECURE
              value: "true"
            - name: OAUTH2_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-github-client-id
                  optional: true
            - name: OAUTH2_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-github-client-secret
                  optional: true
          volumeMounts:
            - name: skillhub-storage
              mountPath: /var/lib/skillhub/storage
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: skillhub-storage
          persistentVolumeClaim:
            claimName: skillhub-storage-pvc
