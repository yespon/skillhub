apiVersion: v1
kind: Secret
metadata:
  name: skillhub-secret
  namespace: skillhub
type: Opaque
# Copy this file to .dev/02-secret.yml and replace every placeholder value.
# This template matches the SourceID-only example in 01-configmap.yml.
# If you keep GitHub login disabled, do not add GitHub OAuth secret keys.
stringData:
  # ========== Database ==========
  POSTGRES_PASSWORD: "change-me"

  # ========== Redis ==========
  REDIS_PASSWORD: "change-me"

  # ========== Object Storage ==========
  SKILLHUB_STORAGE_S3_ACCESS_KEY: "change-me"
  SKILLHUB_STORAGE_S3_SECRET_KEY: "change-me"

  # ========== Bootstrap Admin ==========
  BOOTSTRAP_ADMIN_PASSWORD: "change-me"

  # ========== OAuth2 / SourceID ==========
  # Required when 01-configmap.yml enables SourceID login.
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_ID: "change-me"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_SECRET: "change-me"