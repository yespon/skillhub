apiVersion: v1
kind: Service
metadata:
  name: skillhub-server
  labels:
    app.kubernetes.io/name: skillhub-server
spec:
  selector:
    app.kubernetes.io/name: skillhub-server
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: skillhub-scanner
  labels:
    app.kubernetes.io/name: skillhub-scanner
spec:
  selector:
    app.kubernetes.io/name: skillhub-scanner
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: skillhub-web
  labels:
    app.kubernetes.io/name: skillhub-web
spec:
  selector:
    app.kubernetes.io/name: skillhub-web
  ports:
    - name: http
      port: 80
      targetPort: http
