apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillhub
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
spec:
  ingressClassName: nginx
  rules:
    - host: skillhub.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: skillhub-server
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: skillhub-web
                port:
                  number: 80
