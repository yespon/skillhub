apiVersion: v1
kind: ConfigMap
metadata:
  name: skillhub-config
data:
  # 对外访问地址（用于 OAuth 回调、前端运行时配置等）
  skillhub-public-base-url: ""

  # PostgreSQL 配置（非敏感）
  # 使用外部 PostgreSQL：修改为外部地址；使用 with-infra：保持默认值
  postgres-host: postgres
  postgres-port: "5432"
  postgres-db: skillhub
  postgres-user: skillhub

  # Redis 配置
  # 使用外部 Redis：修改为外部主机地址
  # 使用内置 Redis（overlays/with-infra）：保持 redis
  redis-host: redis
  redis-port: "6379"

  # 技能存储路径
  storage-base-path: /var/lib/skillhub/storage

  # 存储配置
  # local: 本地存储（默认）, s3: S3/OSS 对象存储
  skillhub-storage-provider: local
  skillhub-storage-s3-endpoint: ""
  skillhub-storage-s3-bucket: skillhub
  skillhub-storage-s3-region: us-east-1
  skillhub-storage-s3-force-path-style: "false"
  skillhub-storage-s3-auto-create-bucket: "false"
  skillhub-storage-s3-presign-expiry: PT10M

  # 技能扫描器配置
  skill-scanner-enabled: "true"
  skill-scanner-url: http://skillhub-scanner:8000
  skill-scanner-mode: upload

  # SourceID / 私有 SSO（可选）
  oauth2-sourceid-provider: sourceid
  oauth2-sourceid-authorization-grant-type: authorization_code
  oauth2-sourceid-redirect-uri: ""
  oauth2-sourceid-client-name: SourceID
  oauth2-sourceid-authorization-uri: ""
  oauth2-sourceid-token-uri: ""
  oauth2-sourceid-user-info-uri: ""
  oauth2-sourceid-user-name-attribute: id

  # SourceID 登录后 namespace 自动补齐（可选）
  skillhub-auth-sourceid-namespace-sync-enabled: "false"
  skillhub-auth-sourceid-namespace-sync-provider-code: sourceid
  skillhub-auth-sourceid-namespace-sync-attribute-root-key: attributes
  skillhub-auth-sourceid-namespace-sync-active-status-key: active
  skillhub-auth-sourceid-namespace-sync-active-status-values-0: "true"
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-key: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-value: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-0: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-1: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-2: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-namespace-slug: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-role: MEMBER
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-key: ""
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-value: ""
  skillhub-auth-sourceid-namespace-sync-mappings-1-namespace-slug: ""
  skillhub-auth-sourceid-namespace-sync-mappings-1-role: MEMBER

  # SourceID OSDS 组织关系增强（可选）
  # fail-open=true 时，OSDS 异常不会阻断登录，只是不执行自动补齐；
  # fail-open=false 时，OSDS 查询失败会直接中断本次登录。
  skillhub-auth-sourceid-osds-enabled: "false"
  skillhub-auth-sourceid-osds-base-url: ""
  skillhub-auth-sourceid-osds-staff-by-user-id-path: /staff/user-id/{userId}/data
  skillhub-auth-sourceid-osds-sysid: ""
  skillhub-auth-sourceid-osds-sign-server-auth: ""
  skillhub-auth-sourceid-osds-fail-open: "true"

  # Bootstrap 管理员配置（非敏感）
  bootstrap-admin-enabled: "true"
  bootstrap-admin-user-id: docker-admin
  bootstrap-admin-username: admin
  bootstrap-admin-display-name: Platform Admin
  bootstrap-admin-email: admin@example.com

  # 认证入口控制
  skillhub-auth-local-show-entry: "true"
  skillhub-access-policy-mode: OPEN
  skillhub-access-policy-allowed-providers: ""

  # 前端代理上游
  skillhub-api-upstream: http://skillhub-server:8080

  # Session 配置
  # HTTP 环境设为 false，HTTPS 环境设为 true
  session-cookie-secure: "false"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skillhub-storage-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
