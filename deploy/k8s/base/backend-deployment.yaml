apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-server
  labels:
    app.kubernetes.io/name: skillhub-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-server
    spec:
      containers:
        - name: server
          image: ghcr.io/iflytek/skillhub-server:edge
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker

            - name: SKILLHUB_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-public-base-url

            # Database
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-port
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-db
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-user
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: POSTGRES_PASSWORD

            # Redis
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-host
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: REDIS_PASSWORD

            # Storage
            - name: STORAGE_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: storage-base-path
            - name: SKILLHUB_STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-provider
            - name: SKILLHUB_STORAGE_S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-endpoint
            - name: SKILLHUB_STORAGE_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-bucket
            - name: SKILLHUB_STORAGE_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-region
            - name: SKILLHUB_STORAGE_S3_FORCE_PATH_STYLE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-force-path-style
            - name: SKILLHUB_STORAGE_S3_AUTO_CREATE_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-auto-create-bucket
            - name: SKILLHUB_STORAGE_S3_PRESIGN_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-storage-s3-presign-expiry
            - name: SKILLHUB_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILLHUB_STORAGE_S3_ACCESS_KEY
                  optional: true
            - name: SKILLHUB_STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILLHUB_STORAGE_S3_SECRET_KEY
                  optional: true

            # Scanner
            - name: SKILLHUB_SECURITY_SCANNER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skill-scanner-enabled
            - name: SKILLHUB_SECURITY_SCANNER_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skill-scanner-url
            - name: SKILLHUB_SECURITY_SCANNER_MODE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skill-scanner-mode

            # Session
            - name: SESSION_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: session-cookie-secure
            - name: SKILLHUB_AUTH_LOCAL_SHOW_ENTRY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-local-show-entry
            - name: SKILLHUB_ACCESS_POLICY_MODE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-access-policy-mode
            - name: SKILLHUB_ACCESS_POLICY_ALLOWED_PROVIDERS
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-access-policy-allowed-providers

            # Bootstrap Admin (non-sensitive from ConfigMap)
            - name: BOOTSTRAP_ADMIN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: bootstrap-admin-enabled
            - name: BOOTSTRAP_ADMIN_USER_ID
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: bootstrap-admin-user-id
            - name: BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: bootstrap-admin-username
            - name: BOOTSTRAP_ADMIN_DISPLAY_NAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: bootstrap-admin-display-name
            - name: BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: bootstrap-admin-email

            # Bootstrap Admin Password (sensitive from Secret)
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: BOOTSTRAP_ADMIN_PASSWORD
                  optional: true

            # OAuth2 GitHub (optional)
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-github-client-id
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: oauth2-github-client-secret
                  optional: true

            # OAuth2 SourceID (optional)
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_ID
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_SECRET
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-provider
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_AUTHORIZATION_GRANT_TYPE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-authorization-grant-type
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-redirect-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SOURCEID_CLIENT_NAME
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-client-name
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_AUTHORIZATION_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-authorization-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_TOKEN_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-token-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_USER_INFO_URI
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-user-info-uri
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SOURCEID_USER_NAME_ATTRIBUTE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: oauth2-sourceid-user-name-attribute

            # SourceID namespace sync (optional)
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-enabled
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_PROVIDER_CODE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-provider-code
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ATTRIBUTE_ROOT_KEY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-attribute-root-key
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_KEY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-active-status-key
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_0
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-active-status-values-0
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_KEY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-key
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-value
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUES_0
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-0
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUES_1
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-1
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUES_2
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-2
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_NAMESPACE_SLUG
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-namespace-slug
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ROLE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-0-role
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_KEY
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-key
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-value
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_NAMESPACE_SLUG
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-1-namespace-slug
            - name: SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ROLE
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-namespace-sync-mappings-1-role

            # SourceID OSDS organization enrichment (optional)
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-osds-enabled
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-osds-base-url
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_STAFF_BY_USER_ID_PATH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-osds-staff-by-user-id-path
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_SYSID
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-osds-sysid
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_SIGN_SERVER_AUTH
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-osds-sign-server-auth
            - name: SKILLHUB_AUTH_SOURCEID_OSDS_FAIL_OPEN
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: skillhub-auth-sourceid-osds-fail-open

          volumeMounts:
            - name: skillhub-storage
              mountPath: /var/lib/skillhub/storage
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: skillhub-storage
          persistentVolumeClaim:
            claimName: skillhub-storage-pvc
