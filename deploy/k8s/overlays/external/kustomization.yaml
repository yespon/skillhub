# 外部数据库部署
# 使用方式：kubectl apply -k overlays/external/
# 前置条件：修改 base/configmap.yaml 中的数据库/Redis 地址，并先应用 .dev/02-secret.yml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skillhub

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/deployment: external-db
