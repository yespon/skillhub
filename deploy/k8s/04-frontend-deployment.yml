apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-web
  namespace: skillhub
  labels:
    app.kubernetes.io/name: skillhub-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-web
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: web
          # 替换为实际镜像仓库地址（内网需提前同步镜像）
          image: harbor.ruijie.com.cn/skillhub/skillhub-web:20260405
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            # 指向集群内 server Service（ClusterIP）
            - name: SKILLHUB_API_UPSTREAM
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_API_UPSTREAM
            # 对外公开 URL，用于 OAuth 回调等
            - name: SKILLHUB_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILLHUB_PUBLIC_BASE_URL
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
