apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillhub-scanner
  namespace: skillhub
  labels:
    app.kubernetes.io/name: skillhub-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skillhub-scanner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skillhub-scanner
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: scanner
          image: harbor.ruijie.com.cn/skillhub/skillhub-scanner:20260405
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SKILL_SCANNER_LLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILL_SCANNER_LLM_BASE_URL
                  optional: true
            - name: SKILL_SCANNER_LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: skillhub-config
                  key: SKILL_SCANNER_LLM_MODEL
                  optional: true
            - name: SKILL_SCANNER_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: skillhub-secret
                  key: SKILL_SCANNER_LLM_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
