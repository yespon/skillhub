apiVersion: v1
kind: ConfigMap
metadata:
  name: skillhub-config
  namespace: skillhub
data:
  # Copy this file to .dev/01-configmap.yml and replace placeholder values for your cluster.

  # 对外访问地址（用于 OAuth 回调、前端运行时配置等）
  skillhub-public-base-url: "https://skillhub.example.com"

  # PostgreSQL 配置（非敏感）
  # 使用外部 PostgreSQL：修改为外部地址；使用 with-infra：保持默认值
  postgres-host: postgres.example.internal
  postgres-port: "5432"
  postgres-db: skillhub
  postgres-user: skillhub

  # Redis 配置
  # 使用外部 Redis：修改为外部主机地址；使用内置 Redis：保持 redis
  redis-host: redis.example.internal
  redis-port: "6379"

  # 技能存储路径
  storage-base-path: /var/lib/skillhub/storage

  # 存储配置
  # local: 本地存储（默认）, s3: S3/OSS 对象存储
  skillhub-storage-provider: s3
  skillhub-storage-s3-endpoint: "https://s3.example.com"
  skillhub-storage-s3-bucket: skillhub
  skillhub-storage-s3-region: us-east-1
  skillhub-storage-s3-force-path-style: "false"
  skillhub-storage-s3-auto-create-bucket: "false"
  skillhub-storage-s3-presign-expiry: PT10M

  # 技能扫描器配置
  skill-scanner-enabled: "true"
  skill-scanner-url: http://skillhub-scanner:8000
  skill-scanner-mode: upload

  # ========== Bootstrap 管理员 ==========
  # 生产环境沿用现有 bootstrap 管理员配置，避免镜像发布时引入登录入口漂移。
  BOOTSTRAP_ADMIN_ENABLED: "true"
  BOOTSTRAP_ADMIN_USER_ID: "admin"
  BOOTSTRAP_ADMIN_USERNAME: "liuyanpeng"
  BOOTSTRAP_ADMIN_DISPLAY_NAME: "Platform Admin"
  BOOTSTRAP_ADMIN_EMAIL: "liuyanpeng@ruijie.com.cn"

  # SourceID / 私有 SSO（可选）
  # 下面示例展示“仅显示 SourceID，隐藏本地账号入口”的常见部署方式。
  oauth2-sourceid-provider: sourceid
  oauth2-sourceid-authorization-grant-type: authorization_code
  oauth2-sourceid-redirect-uri: "https://skillhub.example.com/login/oauth2/code/sourceid"
  oauth2-sourceid-client-name: SourceID
  oauth2-sourceid-authorization-uri: "https://sourceid.example.com/oauth2.0/authorize"
  oauth2-sourceid-token-uri: "https://sourceid.example.com/oauth2.0/accessToken"
  oauth2-sourceid-user-info-uri: "https://sourceid.example.com/oauth2.0/profile"
  oauth2-sourceid-user-name-attribute: id

  # SourceID 登录后 namespace 自动补齐（可选）
  # 当前示例已启用，按 OSDS 组织属性只增不删地补齐 namespace 成员。
  skillhub-auth-sourceid-namespace-sync-enabled: "true"
  skillhub-auth-sourceid-namespace-sync-provider-code: sourceid
  skillhub-auth-sourceid-namespace-sync-attribute-root-key: attributes
  # 当前配置改用 OSDS 的 staffStatus 做在任判定。
  skillhub-auth-sourceid-namespace-sync-active-status-key: staffStatus
  skillhub-auth-sourceid-namespace-sync-active-status-values-0: "0"
  skillhub-auth-sourceid-namespace-sync-active-status-values-1: "1"
  # mapping-0: oneDepartmentCode=000023 -> it-team
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-key: oneDepartmentCode
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-value: "000023"
  skillhub-auth-sourceid-namespace-sync-mappings-0-namespace-slug: it-team
  skillhub-auth-sourceid-namespace-sync-mappings-0-role: MEMBER
  # mapping-1: nv1 场景 — 多个二级部门映射到 ebg-skills
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-key: twoDepartmentCode
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-0: "000062707"  # 网络产品事业部
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-1: "000062710"  # 软件平台业务开发部
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-2: "000062711"  # 硬件平台业务开发部
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-3: "000062712"  # EBG产研运营管理部
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-4: "000062713"  # 质量管理部
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-5: "000062715"  # 产品技术平台部
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-values-6: "000062723"  # 软件产品事业部
  skillhub-auth-sourceid-namespace-sync-mappings-1-namespace-slug: ebg-skills
  skillhub-auth-sourceid-namespace-sync-mappings-1-role: MEMBER

  # SourceID OSDS 组织关系增强（可选）
  # 开启后会用 claims.subject 作为 userId 调 OSDS，把 departmentCode 等字段并入映射上下文。
  # fail-open=true 时，OSDS 异常不会阻断登录，只是不执行自动补齐；
  # fail-open=false 时，OSDS 查询失败会直接中断本次登录。
  skillhub-auth-sourceid-osds-enabled: "true"
  skillhub-auth-sourceid-osds-base-url: "http://service-gw.ruijie.com.cn/api/osds-api"
  skillhub-auth-sourceid-osds-staff-by-user-id-path: /staff/user-id/{userId}/data
  skillhub-auth-sourceid-osds-sysid: "skillhub"
  skillhub-auth-sourceid-osds-sign-server-auth: ""
  skillhub-auth-sourceid-osds-fail-open: "true"

  # Bootstrap 管理员配置（非敏感）
  bootstrap-admin-enabled: "true"
  bootstrap-admin-user-id: docker-admin
  bootstrap-admin-username: admin
  bootstrap-admin-display-name: Platform Admin
  bootstrap-admin-email: admin@example.com

  # 认证入口控制
  skillhub-auth-local-show-entry: "false"
  skillhub-access-policy-mode: PROVIDER_ALLOWLIST
  skillhub-access-policy-allowed-providers: sourceid

  # 前端代理上游
  skillhub-api-upstream: http://skillhub-server:8080

  # Session 配置
  session-cookie-secure: "true"

  # ========== 以下为生产环境 SCREAMING_SNAKE 配置（直接作为 env 注入） ==========

  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ENABLED: "true"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_PROVIDER_CODE: "sourceid"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ATTRIBUTE_ROOT_KEY: "attributes"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_KEY: "staffStatus"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_0: "0"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_ACTIVE_STATUS_VALUES_1: "1"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_KEY: "oneDepartmentCode"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ATTRIBUTE_VALUE: "000023"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_NAMESPACE_SLUG: "it-team"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_0_ROLE: "MEMBER"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_KEY: "twoDepartmentCode"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_0: "000062707"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_1: "000062710"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_2: "000062711"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_3: "000062712"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_4: "000062713"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_5: "000062715"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ATTRIBUTE_VALUES_6: "000062723"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_NAMESPACE_SLUG: "ebg-skills"
  SKILLHUB_AUTH_SOURCEID_NAMESPACE_SYNC_MAPPINGS_1_ROLE: "MEMBER"

  SKILLHUB_AUTH_SOURCEID_OSDS_ENABLED: "true"
  SKILLHUB_AUTH_SOURCEID_OSDS_BASE_URL: "http://service-gw.ruijie.com.cn/api/osds-api"
  SKILLHUB_AUTH_SOURCEID_OSDS_STAFF_BY_USER_ID_PATH: "/staff/user-id/{userId}/data"
  SKILLHUB_AUTH_SOURCEID_OSDS_SIGN_SERVER_AUTH: ""
  SKILLHUB_AUTH_SOURCEID_OSDS_FAIL_OPEN: "true"

  SKILLHUB_SECURITY_SCANNER_ENABLED: "true"
  SKILLHUB_SECURITY_SCANNER_URL: "http://skillhub-scanner:8000"
  SKILLHUB_SECURITY_SCANNER_MODE: "upload"
  SKILL_SCANNER_LLM_BASE_URL: "https://llmproxy.ruijie.com.cn/v1"
  SKILL_SCANNER_LLM_MODEL: "gpt-5.1-mini"

  SKILLHUB_API_UPSTREAM: "http://skillhub-server:8080"
