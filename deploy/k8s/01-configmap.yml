apiVersion: v1
kind: ConfigMap
metadata:
  name: skillhub-config
  namespace: skillhub
data:
  # Copy this file to .dev/01-configmap.yml and replace placeholder values for your cluster.

  # 对外访问地址（用于 OAuth 回调、前端运行时配置等）
  skillhub-public-base-url: "https://skillhub.example.com"

  # PostgreSQL 配置（非敏感）
  # 使用外部 PostgreSQL：修改为外部地址；使用 with-infra：保持默认值
  postgres-host: postgres.example.internal
  postgres-port: "5432"
  postgres-db: skillhub
  postgres-user: skillhub

  # Redis 配置
  # 使用外部 Redis：修改为外部主机地址；使用内置 Redis：保持 redis
  redis-host: redis.example.internal
  redis-port: "6379"

  # 技能存储路径
  storage-base-path: /var/lib/skillhub/storage

  # 存储配置
  # local: 本地存储（默认）, s3: S3/OSS 对象存储
  skillhub-storage-provider: s3
  skillhub-storage-s3-endpoint: "https://s3.example.com"
  skillhub-storage-s3-bucket: skillhub
  skillhub-storage-s3-region: us-east-1
  skillhub-storage-s3-force-path-style: "false"
  skillhub-storage-s3-auto-create-bucket: "false"
  skillhub-storage-s3-presign-expiry: PT10M

  # 技能扫描器配置
  skill-scanner-enabled: "true"
  skill-scanner-url: http://skillhub-scanner:8000
  skill-scanner-mode: upload

  # SourceID / 私有 SSO（可选）
  # 下面示例展示“仅显示 SourceID，隐藏本地账号入口”的常见部署方式。
  oauth2-sourceid-provider: sourceid
  oauth2-sourceid-authorization-grant-type: authorization_code
  oauth2-sourceid-redirect-uri: "https://skillhub.example.com/login/oauth2/code/sourceid"
  oauth2-sourceid-client-name: SourceID
  oauth2-sourceid-authorization-uri: "https://sourceid.example.com/oauth2.0/authorize"
  oauth2-sourceid-token-uri: "https://sourceid.example.com/oauth2.0/accessToken"
  oauth2-sourceid-user-info-uri: "https://sourceid.example.com/oauth2.0/profile"
  oauth2-sourceid-user-name-attribute: id

  # Bootstrap 管理员配置（非敏感）
  bootstrap-admin-enabled: "true"
  bootstrap-admin-user-id: docker-admin
  bootstrap-admin-username: admin
  bootstrap-admin-display-name: Platform Admin
  bootstrap-admin-email: admin@example.com

  # 认证入口控制
  skillhub-auth-local-show-entry: "false"
  skillhub-access-policy-mode: PROVIDER_ALLOWLIST
  skillhub-access-policy-allowed-providers: sourceid

  # 前端代理上游
  skillhub-api-upstream: http://skillhub-server:8080

  # Session 配置
  # HTTP 环境设为 false，HTTPS 环境设为 true
  session-cookie-secure: "true"
