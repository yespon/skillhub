apiVersion: v1
kind: ConfigMap
metadata:
  name: skillhub-config
  namespace: skillhub
data:
  # Copy this file to .dev/01-configmap.yml and replace placeholder values for your cluster.

  # 对外访问地址（用于 OAuth 回调、前端运行时配置等）
  skillhub-public-base-url: "https://skillhub.example.com"

  # PostgreSQL 配置（非敏感）
  # 使用外部 PostgreSQL：修改为外部地址；使用 with-infra：保持默认值
  postgres-host: postgres.example.internal
  postgres-port: "5432"
  postgres-db: skillhub
  postgres-user: skillhub

  # Redis 配置
  # 使用外部 Redis：修改为外部主机地址；使用内置 Redis：保持 redis
  redis-host: redis.example.internal
  redis-port: "6379"

  # 技能存储路径
  storage-base-path: /var/lib/skillhub/storage

  # 存储配置
  # local: 本地存储（默认）, s3: S3/OSS 对象存储
  skillhub-storage-provider: s3
  skillhub-storage-s3-endpoint: "https://s3.example.com"
  skillhub-storage-s3-bucket: skillhub
  skillhub-storage-s3-region: us-east-1
  skillhub-storage-s3-force-path-style: "false"
  skillhub-storage-s3-auto-create-bucket: "false"
  skillhub-storage-s3-presign-expiry: PT10M

  # 技能扫描器配置
  skill-scanner-enabled: "true"
  skill-scanner-url: http://skillhub-scanner:8000
  skill-scanner-mode: upload

  # SourceID / 私有 SSO（可选）
  # 下面示例展示“仅显示 SourceID，隐藏本地账号入口”的常见部署方式。
  oauth2-sourceid-provider: sourceid
  oauth2-sourceid-authorization-grant-type: authorization_code
  oauth2-sourceid-redirect-uri: "https://skillhub.example.com/login/oauth2/code/sourceid"
  oauth2-sourceid-client-name: SourceID
  oauth2-sourceid-authorization-uri: "https://sourceid.example.com/oauth2.0/authorize"
  oauth2-sourceid-token-uri: "https://sourceid.example.com/oauth2.0/accessToken"
  oauth2-sourceid-user-info-uri: "https://sourceid.example.com/oauth2.0/profile"
  oauth2-sourceid-user-name-attribute: id

  # SourceID 登录后 namespace 自动补齐（可选）
  # 当前示例已启用，按 OSDS 组织属性只增不删地补齐 namespace 成员。
  skillhub-auth-sourceid-namespace-sync-enabled: "true"
  skillhub-auth-sourceid-namespace-sync-provider-code: sourceid
  skillhub-auth-sourceid-namespace-sync-attribute-root-key: attributes
  # 当前配置改用 OSDS 的 staffStatus=1 做在任判定。
  skillhub-auth-sourceid-namespace-sync-active-status-key: staffStatus
  skillhub-auth-sourceid-namespace-sync-active-status-values-0: "0"
  skillhub-auth-sourceid-namespace-sync-active-status-values-1: "1"
  # 基于 OSDS 的 departmentCode 做两条互斥映射：
  # 000023 -> it-team，000004 -> ebg-skills。
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-key: departmentCode
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-value: "000023"
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-0: "000023"
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-1: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-attribute-values-2: ""
  skillhub-auth-sourceid-namespace-sync-mappings-0-namespace-slug: it-team
  skillhub-auth-sourceid-namespace-sync-mappings-0-role: MEMBER
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-key: departmentCode
  skillhub-auth-sourceid-namespace-sync-mappings-1-attribute-value: "000004"
  skillhub-auth-sourceid-namespace-sync-mappings-1-namespace-slug: ebg-skills
  skillhub-auth-sourceid-namespace-sync-mappings-1-role: MEMBER
  # 如果你希望同一批用户同时进入两个 namespace，可以故意把 mappings-1 的 attribute-value
  # 改成和 mappings-0 相同；否则请保持两个 mapping 的条件互斥。

  # SourceID OSDS 组织关系增强（可选）
  # 开启后会用 claims.subject 作为 userId 调 OSDS，把 departmentCode 等字段并入映射上下文。
  # fail-open=true 时，OSDS 异常不会阻断登录，只是不执行自动补齐；
  # fail-open=false 时，OSDS 查询失败会直接中断本次登录。
  skillhub-auth-sourceid-osds-enabled: "true"
  skillhub-auth-sourceid-osds-base-url: "https://gw.ruijie.com.cn/v1/api/osds-api"
  skillhub-auth-sourceid-osds-staff-by-user-id-path: /staff/user-id/{userId}/data
  skillhub-auth-sourceid-osds-sysid: "skillhub"
  skillhub-auth-sourceid-osds-sign-server-auth: ""
  skillhub-auth-sourceid-osds-fail-open: "true"

  # Bootstrap 管理员配置（非敏感）
  bootstrap-admin-enabled: "true"
  bootstrap-admin-user-id: docker-admin
  bootstrap-admin-username: admin
  bootstrap-admin-display-name: Platform Admin
  bootstrap-admin-email: admin@example.com

  # 认证入口控制
  skillhub-auth-local-show-entry: "false"
  skillhub-access-policy-mode: PROVIDER_ALLOWLIST
  skillhub-access-policy-allowed-providers: sourceid

  # 前端代理上游
  skillhub-api-upstream: http://skillhub-server:8080

  # Session 配置
  # HTTP 环境设为 false，HTTPS 环境设为 true
  session-cookie-secure: "true"
